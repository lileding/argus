server:
  port: "8080"

feishu:
  app_id: ""
  app_secret: ""
  verification_token: ""
  encrypt_key: ""

model:
  base_url: "http://localhost:11434/v1"
  model_name: "gemma3:27b"
  api_key: ""
  max_tokens: 4096
  timeout: 120s

database:
  dsn: "postgres://argus:argus@localhost:5432/argus?sslmode=disable"

agent:
  max_iterations: 10
  context_window: 20
  skills_dir: ".skills"
  skill_rescan: 30s
  system_prompt: "You are Argus, a personal assistant. You have memory, can use tools, and help users with various tasks. Be concise, accurate, and helpful. Respond in the user's language."

docker:
  image: "argus-sandbox:latest"
  timeout: 30s
  memory_limit: "512m"
  network: "none"

cron:
  jobs: []
  # Example:
  # - name: "daily-stock-analysis"
  #   hour: 9
  #   minute: 0
  #   chat_id: "p2p:ou_xxxxxxxx"
  #   prompt: "请分析今日A股市场走势，给出简要总结。"
