# Argus configuration.
# Default location: ~/.config/argus/argus.toml

# Workspace directory for media files, skills, user files, etc.
# workspace_dir = "~/.local/share/argus"  # default

[gateway.feishu]
app_id = ""
app_secret = ""
# base_url = "https://open.feishu.cn"  # default

# [gateway.feishu.transcription]
# upstream = "local"
# model_name = "whisper-large-v3"

[agent]
max_iterations = 10
orchestrator_context_window = 10
# tavily_api_key = ""  # optional; empty = DuckDuckGo fallback only

[agent.orchestrator]
upstream = "openai"
model_name = "gpt-5.4"
max_tokens = 4096

[agent.synthesizer]
upstream = "gemini"
model_name = "gemini-2.5-flash-lite"
max_tokens = 32768

[embedder]
upstream = "local"
model_name = "modernbert-embed-base"
batch_size = 32
interval_secs = 30
summary_interval_ticks = 10

[embedder.summarizer]
upstream = "gemini"
model_name = "gemini-2.5-flash-lite"

[upstream.openai]
type = "openai"
api_key = ""

[upstream.anthropic]
type = "anthropic"
api_key = ""

[upstream.gemini]
type = "gemini"
api_key = ""

# [upstream.local]
# type = "openai"
# base_url = "http://localhost:8000/v1"
# api_key = "omlx"
# timeout_secs = 240

[database]
dsn = "postgres://argus:argus@localhost:5432/argus?sslmode=disable"
